name: release

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version without leading v, e.g. 0.2.0'
        required: true

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  release:
    runs-on: macos-14
    timeout-minutes: 45
    permissions:
      contents: write
    env:
      DEVELOPER_ID: "Developer ID Application: Daniel Buskariol (BJCVJ5G7MJ)"
      BUNDLE_ID: com.vigil.app
      FEED_URL: https://github.com/dbuskariol/vigil/releases/latest/download/appcast.xml

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Resolve version
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "push" ]; then
            V="${GITHUB_REF_NAME#v}"
          else
            V="${{ github.event.inputs.version }}"
          fi
          echo "VERSION=$V"                   >> "$GITHUB_ENV"
          echo "BUILD=${{ github.run_number }}" >> "$GITHUB_ENV"

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Import Developer ID certificate
        uses: apple-actions/import-codesign-certs@b2e261033a9e248f91a9b57201e8d1e12b15a24e # v7.0.0
        with:
          p12-file-base64: ${{ secrets.DEVELOPER_ID_APPLICATION_P12_BASE64 }}
          p12-password:    ${{ secrets.DEVELOPER_ID_APPLICATION_P12_PASSWORD }}

      - name: Resolve SwiftPM dependencies
        run: swift package resolve

      - name: Build, sign, harden
        run: |
          make release \
            VERSION="$VERSION" \
            BUILD="$BUILD" \
            CODESIGN_IDENTITY="$DEVELOPER_ID" \
            SPARKLE_FEED_URL="$FEED_URL" \
            SPARKLE_PUBLIC_ED_KEY="${{ secrets.SPARKLE_PUBLIC_ED_KEY }}"

      - name: Notarize and staple
        env:
          AC_KEY_ID:     ${{ secrets.APPSTORE_CONNECT_API_KEY_ID }}
          AC_KEY_ISSUER: ${{ secrets.APPSTORE_CONNECT_API_KEY_ISSUER_ID }}
          AC_KEY_P8_B64: ${{ secrets.APPSTORE_CONNECT_API_KEY_P8_BASE64 }}
        run: |
          set -euo pipefail
          P8="$RUNNER_TEMP/AuthKey.p8"
          echo "$AC_KEY_P8_B64" | base64 --decode > "$P8"
          ditto -c -k --sequesterRsrc --keepParent dist/Vigil.app dist/Vigil-notary.zip
          xcrun notarytool submit dist/Vigil-notary.zip \
            --key "$P8" --key-id "$AC_KEY_ID" --issuer "$AC_KEY_ISSUER" \
            --wait --timeout 30m
          xcrun stapler staple dist/Vigil.app
          xcrun stapler validate dist/Vigil.app
          rm -f "$P8" dist/Vigil-notary.zip

      - name: Package stapled .app
        run: ditto -c -k --sequesterRsrc --keepParent dist/Vigil.app "dist/Vigil-$VERSION.zip"

      - name: Render release notes
        env: { GH_TOKEN: ${{ github.token }} }
        run: |
          set -euo pipefail
          MD="releases/notes/$VERSION.md"
          if [ ! -f "$MD" ]; then
            echo "Missing release notes file: $MD" >&2
            exit 1
          fi
          jq -Rs --arg text "$(cat "$MD")" '{text:$text}' < /dev/null \
            | gh api -X POST /markdown --input - \
            > "dist/releaseNotes-$VERSION.html"

      - name: Hydrate prior release zips for multi-entry appcast
        env: { GH_TOKEN: ${{ github.token }} }
        run: |
          set -euo pipefail
          mkdir -p dist/appcast-input
          gh release list --exclude-drafts --limit 20 --json tagName --jq '.[].tagName' \
            | while read -r tag; do
                gh release download "$tag" \
                  --pattern 'Vigil-*.zip' \
                  --pattern 'releaseNotes-*.html' \
                  --dir dist/appcast-input || true
              done
          cp "dist/Vigil-$VERSION.zip" "dist/releaseNotes-$VERSION.html" dist/appcast-input/

      - name: Generate appcast
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          KEY="$RUNNER_TEMP/sparkle_key.txt"
          umask 077
          printf '%s' "$SPARKLE_PRIVATE_KEY" > "$KEY"
          .build/artifacts/sparkle/Sparkle/bin/generate_appcast \
            --ed-key-file "$KEY" \
            --download-url-prefix "https://github.com/dbuskariol/vigil/releases/download/v$VERSION/" \
            --link "https://github.com/dbuskariol/vigil" \
            --maximum-versions 10 \
            dist/appcast-input
          cp dist/appcast-input/appcast.xml dist/appcast.xml

      - name: Shred Sparkle key
        if: always()
        run: |
          KEY="$RUNNER_TEMP/sparkle_key.txt"
          if [ -f "$KEY" ]; then
            /usr/bin/shred -uz "$KEY" 2>/dev/null || rm -fP "$KEY" 2>/dev/null || rm -f "$KEY"
          fi

      - name: Drop any stale draft for this tag
        env: { GH_TOKEN: ${{ github.token }} }
        run: gh release delete "v$VERSION" --yes 2>/dev/null || true

      - name: Create draft release and upload assets
        env: { GH_TOKEN: ${{ github.token }} }
        run: |
          set -euo pipefail
          ASSETS=("dist/Vigil-$VERSION.zip" "dist/releaseNotes-$VERSION.html" "dist/appcast.xml")
          for z in dist/appcast-input/Vigil-*.zip; do
            base="$(basename "$z")"
            if [ "$base" != "Vigil-$VERSION.zip" ]; then
              ASSETS+=("$z")
            fi
          done
          for h in dist/appcast-input/releaseNotes-*.html; do
            base="$(basename "$h")"
            if [ "$base" != "releaseNotes-$VERSION.html" ]; then
              ASSETS+=("$h")
            fi
          done
          gh release create "v$VERSION" \
            --draft \
            --title "v$VERSION" \
            --notes-file "releases/notes/$VERSION.md" \
            "${ASSETS[@]}"

      - name: Publish release
        env: { GH_TOKEN: ${{ github.token }} }
        run: gh release edit "v$VERSION" --draft=false
